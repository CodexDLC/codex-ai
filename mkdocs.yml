site_name: codex-ai
site_description: Agnostic LLM abstraction layer for Codex
site_author: Codex Team

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.breadcrumbs
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra:
  version:
    provider: mike
    default: latest

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_category_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            docstring_style: google
            members_order: source

nav:
  - Home: index.md
  - Guide (EN):
      - Architecture:
          - Core:
              - Overview: en/architecture/core/README.md
              - Data Flow: en/architecture/core/data_flow.md
          - Providers:
              - Overview: en/architecture/providers/README.md
              - Data Flow: en/architecture/providers/data_flow.md
  - Руководство (RU):
      - Архитектура:
          - Core:
              - Обзор: ru/architecture/core/README.md
              - Поток данных: ru/architecture/core/data_flow.md
          - Провайдеры:
              - Обзор: ru/architecture/providers/README.md
              - Поток данных: ru/architecture/providers/data_flow.md
  - API Reference:
      - Overview: en/api/index.md
      - Core:
          - Protocol & Types: en/api/core/protocol.md
          - Dispatcher: en/api/core/dispatcher.md
          - Router: en/api/core/router.md
          - Sync Dispatcher: en/api/core/sync.md
          - Exceptions: en/api/core/exceptions.md
      - Providers:
          - OpenAI: en/api/providers/openai.md
          - Gemini: en/api/providers/gemini.md
          - Anthropic: en/api/providers/anthropic.md
          - OpenRouter: en/api/providers/openrouter.md
          - Multi: en/api/providers/multi.md
  - Changelog: changelog.md
